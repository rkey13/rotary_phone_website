<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotary Archive</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1>The Rotary Archive</h1>
    
    <a href="mailto:rotaryphoneotherworld@gmail.com">
      <h3>For assitance contact rotaryphoneotherworld@gmail.com</h3>
    </a>

    <div id="step-1" class="section">
        <label><strong>Enter Phone Number (1-7 digits):</strong></label>
        <input type="text" id="phoneNumber" maxlength="7" pattern="\d*">
        <label><strong>Password (leave blank if none):</strong></label>
        <input type="password" id="numberPassword" placeholder="Optional">
        <button id="checkBtn">Access Number</button>
    </div>

    <div id="step-2" class="section hidden">
        <h2 id="displayNumber"></h2>
        <p id="numberStatus" style="color: red; font-weight: bold;"></p>
        
        <div id="historyContainer">
            <h3>Audio History</h3>
            <div id="historyList"></div>
        </div>

        <hr>

        <div id="recordingSection">
            <h3>Add New Recording</h3>
            <p><strong>Option A: Upload File</strong></p>
            <input type="file" id="fileUpload" accept="audio/*">
            
            <p><strong>Option B: Record Mic</strong></p>
            <button id="recordBtn">⏺ Start</button>
            <button id="stopBtn" disabled>⏹ Stop</button>
            <span id="recordingStatus"></span>
            
            <br><br>
            <audio id="audioPreview" controls class="hidden"></audio>

            <br><br>
            <label><strong>Description:</strong></label>
            <input type="text" id="description" placeholder="Description">

            <label><input type="checkbox" id="isPublic" checked> Make recording public?</label><br>
            <label><input type="checkbox" id="lockNumber"> Lock number? (Prevents future submissions)</label><br><br>

            <button id="submitBtn" disabled>Submit to Archive</button>
        </div>
    </div>
    <div id="directory-section" class="section">
        <h3>Public Directory</h3>
        <p>Click a number to visit its archive.</p>
        <div id="directoryList">Loading directory...</div>
    </div>

</body>
</html>
